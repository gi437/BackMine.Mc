<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Донаты</title>
<style>
body{text-align:center;font-family:sans-serif;background:white;color:black;}
input,button{padding:8px;margin:5px;}
</style>
</head>
<body>
<h1>Донаты</h1>
<input id="nick" placeholder="Ник игрока"><br>
<button onclick="buy('donater')">💚 Donater</button>
<button onclick="buy('vip')">💛 VIP</button>
<button onclick="buy('vipplus')">💙 VIP+</button>

<h2>Пожертвовать</h2>
<input id="amount" placeholder="Сумма €" type="number"><br>
<button onclick="buy('custom')">Оплатить</button>

<script>
function buy(rank){
    let nick=document.getElementById('nick').value;
    if(!nick){alert("Введи ник");return;}
    let url="http://localhost:8080/d?player="+nick+"&rank="+rank;
    fetch(url).then(()=>alert("✅ Оплата прошла!"));
}
</script>
</body>
</html>

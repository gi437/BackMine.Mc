<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Донат на сервер</title>
<style>
body{background:#121212;color:white;font-family:sans-serif;text-align:center;}
input,select,button{padding:10px;margin:5px;border-radius:8px;}
.card{background:#1e1e1e;padding:20px;margin:20px;border-radius:15px;display:inline-block;}
</style>
</head>
<body>
<h1>🔥 Донат на сервер 🔥</h1>
<input id="nick" placeholder="Ник"><br>
<div class="card">
<h2>💚 Donater — 2€</h2>
<button onclick="buy('donater')">Купить</button>
</div>
<div class="card">
<h2>💛 VIP — 5€</h2>
<button onclick="buy('vip')">Купить</button>
</div>
<div class="card">
<h2>💙 VIP+ — 10€</h2>
<button onclick="buy('vipplus')">Купить</button>
</div>
<div id="pay" style="display:none;">
<h2>Оплата</h2>
<select id="method" onchange="updateForm()">
<option>PayPal</option>
<option>СБП</option>
</select><br>
<div id="paypalFields">
<input id="fname" placeholder="Имя"><br>
<input id="lname" placeholder="Фамилия"><br>
</div>
<input id="card" placeholder="Номер карты" maxlength="19"><br>
<input id="date" placeholder="MM/YY" maxlength="5"><br>
<input id="cvv" placeholder="CVV" maxlength="3"><br>
<button onclick="finish()">Оплатить</button>
</div>
<script>
let rank="";
function buy(r){rank=r;document.getElementById("pay").style.display="block"}
function onlyNumbers(v){return v.replace(/\D/g,"")}
document.getElementById("card").addEventListener("input",e=>{let v=onlyNumbers(e.target.value).substring(0,16);let f=v.match(/.{1,4}/g);e.target.value=f?f.join(" "):"";});
document.getElementById("date").addEventListener("input",e=>{let v=onlyNumbers(e.target.value).substring(0,4);e.target.value=v.length>=3?v.substring(0,2)+"/"+v.substring(2):v;});
document.getElementById("cvv").addEventListener("input",e=>{e.target.value=onlyNumbers(e.target.value).substring(0,3);});
function updateForm(){let method=document.getElementById("method").value;document.getElementById("paypalFields").style.display=(method=="PayPal")?"block":"none";}
function finish(){let nick=document.getElementById("nick").value;if(!nick){alert("Введи ник!");return;}let method=document.getElementById("method").value;if(method=="PayPal"){let fname=document.getElementById("fname").value;let lname=document.getElementById("lname").value;if(!fname||!lname){alert("Введи имя и фамилию!");return;}}alert("✅ Оплата прошла!");fetch(`https://твой-сервер.com/donate?player=${nick}&rank=${rank}`).catch(err=>console.log("Сервер не ответил", err));}
</script>
</body>
</html>

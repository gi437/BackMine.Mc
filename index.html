<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Первоапрельская распродажа</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>ПЕРВО АПРЕЛЬСКАЯ РАСПРОДАЖА — ВСЕ БЕСПЛАТНО!</h1>
        <p>Заканчивается 12 апреля</p>
    </header>

    <main>
        <section id="donate">
            <h2>Донат</h2>
            <input type="text" id="player" placeholder="Ваш ник в Minecraft">
            <select id="rank">
                <option value="donater">Донатер</option>
                <option value="vip">VIP</option>
                <option value="vipplus">VIP+</option>
            </select>
            <button onclick="sendDonate()">Оплатить</button>
            <p id="donate-status"></p>
        </section>

        <section id="support">
            <h2>Пожертвовать</h2>
            <input type="text" id="support-player" placeholder="Ваш ник в Minecraft">
            <input type="number" id="amount" placeholder="Сумма пожертвования">
            <button onclick="sendSupport()">Отправить</button>
            <p id="support-status"></p>
        </section>
    </main>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Донаты</title>
<style>
body{text-align:center;font-family:sans-serif;background:white;color:black;}
input,button{padding:10px;margin:5px;font-size:16px;border-radius:8px;}
</style>
</head>
<body>

<h1>ПЕРВОАПРЕЛЬСКАЯ РАСПРОДАЖА</h1>
<h2>ВСЕ БЕСПЛАТНО</h2>
<p>Заканчивается 12 апреля</p>

<h2>Донаты</h2>
<input id="nick" placeholder="Ник игрока"><br>
<button onclick="buy('donater')">💚 Donater</button>
<button onclick="buy('vip')">💛 VIP</button>
<button onclick="buy('vipplus')">💙 VIP+</button>

<h2>Пожертвовать</h2>
<input id="amount" placeholder="Сумма €" type="number"><br>
<button onclick="buy('custom')">Оплатить</button>

<script>
function buy(rank){
let nick=document.getElementById('nick').value;
if(!nick){alert("Введи ник");return;}
fetch("http://88.130.50.107:8080/d?player="+nick+"&rank="+rank)
.then(()=>alert("✅ Оплата прошла!"))
.catch(()=>alert("Ошибка соединения"));
}
</script>

</body>
</html>
